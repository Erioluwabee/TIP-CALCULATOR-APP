<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/dist/output.css">
    <title>TIP CALCULATOR PROJECT APP</title>
</head>
<body class="bg-[#C5E4E7]">
    
    <section class="flex flex-col">

        <div class="mx-auto p-16">
            <img src="images/logo.svg" alt="logo" class="w-full">
        </div>

       <main class="flex flex-col bg-white lg:w-[70%] lg:mx-auto rounded-t-3xl p-8  lg:flex lg:flex-row lg:gap-10">

         <section id="part1" class="lg:flex-1">

            <div>
                <h1 class="font-mono text-[#879390] font-bold text-xl">Bill</h1>
                <div class="flex flex-row justify-between mt-4 bg-[#F2F9FB] p-3 rounded-lg item-center hover:border hover:border-green-800 ">
                    <span class="font-mono text-[#BECDCD] font-light text-xl">$</span>
                    <input type="text" id="bill" placeholder="0.00" class="font-mono bg-[#F2F9FB] text-right text-[#215455] font-sm ">
                </div> 
            </div>

            <!--Tip Buttons-->
            <div class="mt-6">
                <label for="" class="font-mono text-[#899593] font-bold text-xl">Select Tip%</label>

                <div class="gap-4 mt-4 grid grid-cols-2 lg:grid lg:grid-cols-3 ">
                    <button data-tip="5" class="bg-stone-200 rounded-lg py-2">5%</button>   
                    <button data-tip="10" class="bg-stone-200 ">10%</button>   
                    <button data-tip="15" class="bg-stone-200 ">15%</button>   
                    <button data-tip="20" class="bg-stone-200 ">20%</button>
                    <button data-tip="25" class="bg-stone-200 ">25%</button>    
                    <input type="number" id="custom-tip" placeholder="Custom" class="bg-[#F2F8FB] text-[#A8BEBB] font-extrabold text-2xl rounded-md p-3 text-center font-mono">
                </div>
            </div>

            <!--People-->
            <div class="mt-8">
                <h1 class="font-mono text-[#899593] font-bold text-xl">Number of People</h1>
                <div class="flex justify-between bg-[#F2F9FB] items-center rounded-lg p-4">
                    <img src="images/icon-person.svg" alt="person" class="w-4 h-4">
                    <span id="people" class="text-2xl text-[#215455]">5</span>
                </div>
                
            </div>

        </section>

        <section id="part2" class="mt-6 py-6 lg:flex-1 bg-[#00474A] lg:mt-4 rounded-lg px-5 lg:py-10 ">
               
            <div> <!--Tip Amount-->
                <h1 class="font-mono text-[#ffffff]">Tip Amount</h1>
                <div class="flex justify-between items-center">
                    <span class="font-mono text-[#477A82]">/ person</span>
                    <span id="tip-amount" class="font-extrabold text-4xl text-[#2B9D92] ">$0.00</span>
                </div>
            </div>

            <div class="mt-4"> <!--Amountperson-->
              <h1 class="font-mono text-[#ffffff]">Total</h1>
              <div class="flex justify-between items-center">
              <span class="font-mono text-[#477A82]">/ person</span>
              <span id="total-amount" class="font-extrabold text-4xl text-[#2B9D92]">$30.00</span>
              </div>
            </div>

            <button id="reset" class="px-3 py-3 bg-[#25C3AE] mt-10 text-[#1A8C84] w-full font-bold rounded-lg lg:mt-40">RESET</button>    
        </section>

       </main>
    </section>
    <script>
        const billInput = document.getElementById('bill')
        const peopleInput = document.getElementById('people')
        const tipButtons = document.querySelectorAll('button[data-tip]')
        const customTipInput = document.getElementById('custom-tip')
        const tipAmountDisplay = document.getElementById('tip-amount')
        const totalAmountDisplay = document.getElementById('total-amount')
        const resetBtn = document.getElementById('reset')

        let tipPercent = 0

        //Tip button click
        tipButtons.forEach(button => {
            button.addEventListener('click', () => {
                tipPercent =
                parseFloat(button.dataset.tip)
                tipButtons.forEach(btn =>
                btn.classList.remove('bg-indigo-500', 'text-white'))
                button.classList.add('bg-indigo-500', 'text-white')
                customTipInput.value = '';
                calculateTip()
            })
        })

        //Custom tip Input
        customTipInput.addEventListener('input', () =>{
            tipPercent =
            parseFloat(customTipInput.value) || 0;
            tipButtons.forEach(btn=>
                btn.classList.remove('bg-indigo-500', 'text-white'))
                calculateTip()
        })

        //Bill or people input
        billInput.addEventListener('input', calculateTip)
        peopleInput.addEventListener('input', calculateTip)

        function calculateTip () {
            const bill = parseFloat(billInput.value) || 0;
            const people = parseInt(peopleInput.value) || 1;

            if (people === 0) return;

            const tipTotal = bill * (tipPercent / 100);
            const tipPerPerson = tipTotal / people;
            const totalPerPerson = (bill / people) + tipPerPerson;

                tipAmountDisplay.textContent = tipPerPerson.toFixed(2);
                totalAmountDisplay.textContent = totalPerPerson.toFixed(2);
        }

        //Reset button
        resetBtn.addEventListener('click', () => {
            billInput.value = '';
            peopleInput.value = '';
            customTipInput.value = '';
            tipButtons.forEach(btn =>
                btn.classList.remove('bg-indigo-500', 'text-white'))
                tipPercent = 0;
                tipAmountDisplay.textContent = '0.00'
                totalAmountDisplay.textContent = '0.00'
        })
    </script>
</body>
</html>
